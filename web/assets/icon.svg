<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Token Telemetry">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#0aa89a"/>
    </linearGradient>
  </defs>
  <!-- rounded badge -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <!-- baseline grid -->
  <g stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round">
    <line x1="14" y1="46" x2="50" y2="46"/>
  </g>
  <!-- rising telemetry / burn-rate line -->
  <polyline points="14,42 24,34 32,38 42,22 50,26"
            fill="none" stroke="#ffffff" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- leading data point -->
  <circle cx="42" cy="22" r="4.5" fill="#ffb84d" stroke="#ffffff" stroke-width="1.5"/>
</svg>
